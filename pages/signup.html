<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trek Portal</title>
<link rel="stylesheet" href="./../css/signup.css">
<link rel="icon" type="image-icon" href="./../images/common-image/trekking-logo.png">
</head>

<body>

<div class="container">

    <!-- SIGN UP -->
    <div class="form-box signup">
        <h2>Create Account</h2>

        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">

        <label class="check">
            <input type="checkbox"> Accept Terms & Conditions
        </label>

        <button class="btn">Sign Up</button>

        <p>Already have an account? <span onclick="showLogin()">Login</span></p>
    </div>


    <!-- LOGIN -->
    <div class="form-box login">
        <h2>Welcome Back</h2>

       <h3>Already registered? To stay connected, please loginwith your details</h3>

        <button class="btn">Login</button>

        <p>Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
    </div>

</div>

<script src="./../js/signup.js"></script>

</body>
</html>
